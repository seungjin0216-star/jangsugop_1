<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="장수한우">
  <title>장수한우곱창 손익계산서</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #2a2a2a;
      --text-primary: #ffffff;
      --text-secondary: #a0a0a0;
      --accent-red: #dc2626;
      --accent-yellow: #fbbf24;
      --accent-green: #22c55e;
      --border-color: #3a3a3a;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding-bottom: 60px;
    }
    
    /* 로딩 화면 */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid var(--bg-tertiary);
      border-top-color: var(--accent-red);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      margin-top: 20px;
      color: var(--text-secondary);
      font-size: 14px;
    }
    
    /* 로그인 화면 */
    .login-container {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg-primary);
      align-items: center;
      justify-content: center;
      z-index: 9998;
      padding: 20px;
    }
    
    .login-box {
      background: var(--bg-secondary);
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    
    .login-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--accent-red), var(--accent-yellow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .login-subtitle {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 30px;
    }
    
    .login-input {
      width: 100%;
      padding: 16px;
      background: var(--bg-tertiary);
      border: 2px solid var(--border-color);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 18px;
      text-align: center;
      letter-spacing: 4px;
      margin-bottom: 20px;
    }
    
    .login-input:focus {
      outline: none;
      border-color: var(--accent-red);
    }
    
    .login-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent-red);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    
    .login-btn:active {
      background: #b91c1c;
    }
    
    .error-message {
      color: var(--accent-red);
      font-size: 14px;
      margin-top: 10px;
      display: none;
    }
    
    /* 헤더 */
    .header {
      background: var(--bg-secondary);
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .app-title {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-red), var(--accent-yellow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* 지점 선택 */
    .branch-selector {
      display: flex;
      gap: 12px;
      padding: 16px;
      background: var(--bg-secondary);
    }
    
    .branch-btn {
      flex: 1;
      padding: 16px;
      background: var(--bg-tertiary);
      border: 2px solid var(--border-color);
      border-radius: 12px;
      color: var(--text-secondary);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .branch-btn.active {
      background: var(--accent-red);
      border-color: var(--accent-red);
      color: white;
    }
    
    /* 연/월 선택 */
    .date-selector {
      display: flex;
      gap: 12px;
      padding: 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
    }
    
    .date-picker {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 15px;
      text-align: center;
      cursor: pointer;
    }
    
    .date-picker:focus {
      outline: none;
      border-color: var(--accent-red);
    }
    
    /* 요약 카드 */
    .summary-card {
      margin: 16px;
      padding: 24px;
      background: linear-gradient(135deg, var(--accent-red), #b91c1c);
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(220, 38, 38, 0.3);
    }
    
    .summary-label {
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      margin-bottom: 8px;
    }
    
    .summary-value {
      font-size: 32px;
      font-weight: 700;
      color: white;
      margin-bottom: 8px;
    }
    
    .summary-date {
      color: rgba(255, 255, 255, 0.7);
      font-size: 13px;
    }
    
    /* 탭 */
    .tabs {
      display: flex;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    
    .tab {
      flex: 1;
      min-width: 80px;
      padding: 16px 12px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
    }
    
    .tab.active {
      color: var(--accent-red);
      border-bottom-color: var(--accent-red);
    }
    
    .tab-content {
      display: none;
      padding: 16px;
    }
    
    .tab-content.active {
      display: block;
    }
    
    /* 아코디언 */
    .accordion-item {
      background: var(--bg-secondary);
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    
    .accordion-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px;
      cursor: pointer;
      transition: background 0.3s;
    }
    
    .accordion-header:active {
      background: var(--bg-tertiary);
    }
    
    .accordion-title {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }
    
    .accordion-icon {
      width: 8px;
      height: 8px;
      background: var(--accent-red);
      border-radius: 50%;
    }
    
    .accordion-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .accordion-value {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
    }
    
    .accordion-value.positive {
      color: var(--accent-green);
    }
    
    .accordion-value.negative {
      color: var(--accent-red);
    }
    
    .accordion-chevron {
      width: 20px;
      height: 20px;
      transition: transform 0.3s;
      color: var(--text-secondary);
    }
    
    .accordion-header.active .accordion-chevron {
      transform: rotate(180deg);
    }
    
    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }
    
    .accordion-content.active {
      max-height: 1000px;
    }
    
    .accordion-details {
      padding: 0 18px 18px 18px;
    }
    
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-color);
      font-size: 14px;
    }
    
    .detail-row:last-child {
      border-bottom: none;
    }
    
    .detail-label {
      color: var(--text-secondary);
    }
    
    .detail-value {
      color: var(--text-primary);
      font-weight: 600;
    }
    
    /* 차트 */
    .chart-container {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    
    .chart-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-primary);
    }
    
    canvas {
      max-height: 250px;
    }
    
    /* 비율 표시 */
    .ratio-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    
    .ratio-card {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    
    .ratio-label {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    
    .ratio-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
    }
    
    .ratio-bar {
      height: 6px;
      background: var(--bg-tertiary);
      border-radius: 3px;
      margin-top: 8px;
      overflow: hidden;
    }
    
    .ratio-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-red), var(--accent-yellow));
      border-radius: 3px;
      transition: width 0.5s ease-out;
    }
    
    /* 일별 매출 */
    .daily-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }
    
    .daily-item {
      background: var(--bg-secondary);
      border-radius: 8px;
      padding: 12px 8px;
      text-align: center;
    }
    
    .daily-day {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    
    .daily-amount {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .daily-item.today {
      background: var(--accent-red);
    }
    
    .daily-item.today .daily-day,
    .daily-item.today .daily-amount {
      color: white;
    }
    
    /* 목표 설정 */
    .goal-section {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    
    .goal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .goal-title {
      font-size: 16px;
      font-weight: 600;
    }
    
    .goal-edit-btn {
      padding: 8px 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
    }
    
    .progress-bar {
      height: 40px;
      background: var(--bg-tertiary);
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      margin-bottom: 12px;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-green), #16a34a);
      transition: width 0.5s ease-out;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .progress-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 14px;
      font-weight: 600;
      color: white;
      z-index: 1;
    }
    
    .goal-stats {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    /* 유틸리티 */
    .text-center {
      text-align: center;
    }
    
    .mt-4 {
      margin-top: 16px;
    }
    
    .mb-4 {
      margin-bottom: 16px;
    }
    
    .hidden {
      display: none !important;
    }
    
    /* 반응형 */
    @media (min-width: 768px) {
      body {
        max-width: 768px;
        margin: 0 auto;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
      }
    }
  </style>
</head>
<body>
  <!-- 로딩 화면 -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-spinner"></div>
    <div class="loading-text">로딩 중...</div>
  </div>
  
  <!-- 로그인 화면 -->
  <div class="login-container" id="loginContainer">
    <div class="login-box">
      <div class="login-title">장수한우곱창</div>
      <div class="login-subtitle">손익계산서</div>
      <input type="password" class="login-input" id="passwordInput" placeholder="비밀번호" maxlength="6" inputmode="numeric">
      <button class="login-btn" id="loginBtn">로그인</button>
      <div class="error-message" id="errorMessage">비밀번호가 올바르지 않습니다</div>
    </div>
  </div>
  
  <!-- 메인 앱 -->
  <div id="mainApp" class="hidden">
    <!-- 헤더 -->
    <div class="header">
      <div class="app-title">🥩 장수한우곱창 손익계산서</div>
    </div>
    
    <!-- 지점 선택 -->
    <div class="branch-selector">
      <button class="branch-btn active" data-branch="원당점" id="branchWondang">📍 원당점</button>
      <button class="branch-btn" data-branch="백석점" id="branchBaekseok">📍 백석점</button>
    </div>
    
    <!-- 연/월 선택 -->
    <div class="date-selector">
      <select class="date-picker" id="yearPicker"></select>
      <select class="date-picker" id="monthPicker"></select>
    </div>
    
    <!-- 요약 카드 -->
    <div class="summary-card">
      <div class="summary-label">매출 순 이익</div>
      <div class="summary-value" id="summaryValue">-</div>
      <div class="summary-date" id="summaryDate">-</div>
    </div>
    
    <!-- 탭 -->
    <div class="tabs">
      <button class="tab active" data-tab="pl">손익계산서</button>
      <button class="tab" data-tab="analysis">비율 분석</button>
      <button class="tab" data-tab="trend">월별 추이</button>
      <button class="tab" data-tab="daily">일별 현황</button>
      <button class="tab" data-tab="goal">목표 설정</button>
    </div>
    
    <!-- 손익계산서 탭 -->
    <div class="tab-content active" data-tab-content="pl" id="plContent">
      <!-- 아코디언 항목들이 동적으로 추가됩니다 -->
    </div>
    
    <!-- 비율 분석 탭 -->
    <div class="tab-content" data-tab-content="analysis">
      <div class="ratio-grid" id="ratioGrid">
        <!-- 비율 카드들이 동적으로 추가됩니다 -->
      </div>
    </div>
    
    <!-- 월별 추이 탭 -->
    <div class="tab-content" data-tab-content="trend">
      <div class="chart-container">
        <div class="chart-title">매출 추이</div>
        <canvas id="revenueChart"></canvas>
      </div>
      <div class="chart-container">
        <div class="chart-title">순이익 추이</div>
        <canvas id="profitChart"></canvas>
      </div>
    </div>
    
    <!-- 일별 현황 탭 -->
    <div class="tab-content" data-tab-content="daily">
      <div class="daily-grid" id="dailyGrid">
        <!-- 일별 항목들이 동적으로 추가됩니다 -->
      </div>
    </div>
    
    <!-- 목표 설정 탭 -->
    <div class="tab-content" data-tab-content="goal">
      <div class="goal-section">
        <div class="goal-header">
          <div class="goal-title">월 매출 목표</div>
          <button class="goal-edit-btn" onclick="editGoal('revenue')">수정</button>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="revenueProgress" style="width: 0%"></div>
          <div class="progress-text" id="revenueProgressText">0%</div>
        </div>
        <div class="goal-stats">
          <span>현재: <span id="currentRevenue">0</span>원</span>
          <span>목표: <span id="goalRevenue">0</span>원</span>
        </div>
      </div>
      
      <div class="goal-section">
        <div class="goal-header">
          <div class="goal-title">월 순이익 목표</div>
          <button class="goal-edit-btn" onclick="editGoal('profit')">수정</button>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="profitProgress" style="width: 0%"></div>
          <div class="progress-text" id="profitProgressText">0%</div>
        </div>
        <div class="goal-stats">
          <span>현재: <span id="currentProfit">0</span>원</span>
          <span>목표: <span id="goalProfit">0</span>원</span>
        </div>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    // 앱 상태
    const APP_STATE = {
      apiEndpoint: 'https://script.google.com/macros/s/AKfycbyztj6WcMdC3HHSUBbszgPlAREmSgZb7zmVVggm1yATzNvpaPEErsyIbhbXU5EtZ8pe/exec',
      password: null,
      currentBranch: '원당점',
      currentYear: new Date().getFullYear(),
      currentMonth: new Date().getMonth() + 1,
      data: null,
      goals: {
        revenue: parseInt(localStorage.getItem('goalRevenue')) || 50000000,
        profit: parseInt(localStorage.getItem('goalProfit')) || 10000000
      }
    };
    
    // 초기화
    document.addEventListener('DOMContentLoaded', init);
    
    function init() {
      // 저장된 비밀번호 확인
      const savedPassword = localStorage.getItem('jangsuhan_password');
      if (savedPassword) {
        APP_STATE.password = savedPassword;
        showMainApp();
      } else {
        showLogin();
      }
      
      // 이벤트 리스너
      document.getElementById('loginBtn').addEventListener('click', handleLogin);
      document.getElementById('passwordInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
      });
      
      // 지점 선택
      document.querySelectorAll('.branch-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.branch-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          APP_STATE.currentBranch = btn.dataset.branch;
          loadData();
        });
      });
      
      // 탭 선택
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          const tabName = tab.dataset.tab;
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          tab.classList.add('active');
          document.querySelector(`[data-tab-content="${tabName}"]`).classList.add('active');
          
          if (tabName === 'trend') {
            renderCharts();
          } else if (tabName === 'daily') {
            loadDailyRevenue();
          }
        });
      });
      
      // 연/월 선택
      initDatePickers();
      document.getElementById('yearPicker').addEventListener('change', (e) => {
        APP_STATE.currentYear = parseInt(e.target.value);
        loadData();
      });
      document.getElementById('monthPicker').addEventListener('change', (e) => {
        APP_STATE.currentMonth = parseInt(e.target.value);
        loadData();
      });
    }
    
    function showLogin() {
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('loginContainer').style.display = 'flex';
      document.getElementById('mainApp').classList.add('hidden');
    }
    
    function showMainApp() {
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('loginContainer').style.display = 'none';
      document.getElementById('mainApp').classList.remove('hidden');
      loadData();
    }
    
    async function handleLogin() {
      const password = document.getElementById('passwordInput').value;
      const errorMsg = document.getElementById('errorMessage');
      
      if (!password) {
        errorMsg.style.display = 'block';
        return;
      }
      
      // 비밀번호 확인 (실제 API 호출로 검증)
      const isValid = await verifyPassword(password);
      
      if (isValid) {
        APP_STATE.password = password;
        localStorage.setItem('jangsuhan_password', password);
        errorMsg.style.display = 'none';
        showMainApp();
      } else {
        errorMsg.style.display = 'block';
        document.getElementById('passwordInput').value = '';
      }
    }
    
    async function verifyPassword(password) {
      try {
        const response = await fetch(APP_STATE.apiEndpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            password: password,
            branch: '원당점',
            year: 2026,
            month: 1
          })
        });
        
        const result = await response.json();
        return result.success;
      } catch (error) {
        console.error('Password verification failed:', error);
        // 개발 모드: 비밀번호 940216으로 임시 허용
        return password === '940216';
      }
    }
    
    function initDatePickers() {
      const yearPicker = document.getElementById('yearPicker');
      const monthPicker = document.getElementById('monthPicker');
      
      // 연도 (2025-2030)
      for (let year = 2025; year <= 2030; year++) {
        const option = document.createElement('option');
        option.value = year;
        option.textContent = `${year}년`;
        if (year === APP_STATE.currentYear) option.selected = true;
        yearPicker.appendChild(option);
      }
      
      // 월 (1-12)
      for (let month = 1; month <= 12; month++) {
        const option = document.createElement('option');
        option.value = month;
        option.textContent = `${month}월`;
        if (month === APP_STATE.currentMonth) option.selected = true;
        monthPicker.appendChild(option);
      }
    }
    
    async function loadData() {
      document.getElementById('loadingScreen').style.display = 'flex';
      
      try {
        const response = await fetch(APP_STATE.apiEndpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            password: APP_STATE.password,
            branch: APP_STATE.currentBranch,
            year: APP_STATE.currentYear,
            month: APP_STATE.currentMonth
          })
        });
        
        const result = await response.json();
        
        if (result.success) {
          APP_STATE.data = result.data;
          renderUI();
        } else {
          alert('데이터를 불러오는데 실패했습니다: ' + result.error);
        }
      } catch (error) {
        console.error('Data loading failed:', error);
        // 개발 모드: 샘플 데이터 사용
        APP_STATE.data = getSampleData();
        renderUI();
      } finally {
        document.getElementById('loadingScreen').style.display = 'none';
      }
    }
    
    function renderUI() {
      const data = APP_STATE.data;
      if (!data) return;
      
      // 요약 카드
      document.getElementById('summaryValue').textContent = formatCurrency(data.netProfit);
      document.getElementById('summaryDate').textContent = data.lastUpdatedDay 
        ? `'${data.lastUpdatedDay}일'까지의 손익계산서`
        : '데이터 업데이트 필요';
      
      // 손익계산서
      renderProfitLoss(data);
      
      // 비율 분석
      renderRatios(data);
      
      // 목표 달성률
      renderGoals(data);
    }
    
    function renderProfitLoss(data) {
      const container = document.getElementById('plContent');
      container.innerHTML = '';
      
      const items = [
        {
          title: '매출액',
          value: data.revenue.total,
          details: {
            '현금매출': data.revenue.cash,
            '카드매출': data.revenue.card
          }
        },
        {
          title: '매출원가',
          value: data.cogs.total,
          details: data.cogs.items
        },
        {
          title: '매출총이익',
          value: data.grossProfit,
          isProfit: true
        },
        {
          title: '인건비',
          value: data.laborCost.total,
          details: data.laborCost.items
        },
        {
          title: '고정비',
          value: data.fixedCost.total,
          details: data.fixedCost.items
        },
        {
          title: '변동비',
          value: data.variableCost.total,
          details: data.variableCost.items
        },
        {
          title: '영업이익',
          value: data.operatingProfit,
          isProfit: true
        },
        {
          title: '세금예수금',
          value: data.tax
        },
        {
          title: '순이익',
          value: data.netProfit,
          isProfit: true,
          highlight: true
        }
      ];
      
      items.forEach(item => {
        const accordion = createAccordion(item);
        container.appendChild(accordion);
      });
    }
    
    function createAccordion(item) {
      const div = document.createElement('div');
      div.className = 'accordion-item';
      
      const hasDetails = item.details && Object.keys(item.details).length > 0;
      
      const valueClass = item.isProfit 
        ? (item.value >= 0 ? 'positive' : 'negative')
        : '';
      
      div.innerHTML = `
        <div class="accordion-header ${hasDetails ? 'clickable' : ''}" ${hasDetails ? 'onclick="toggleAccordion(this)"' : ''}>
          <div class="accordion-title">
            <div class="accordion-icon"></div>
            <div class="accordion-label">${item.title}</div>
          </div>
          <div class="accordion-value ${valueClass}">${formatCurrency(item.value)}</div>
          ${hasDetails ? '<div class="accordion-chevron">▼</div>' : ''}
        </div>
        ${hasDetails ? `
          <div class="accordion-content">
            <div class="accordion-details">
              ${Object.entries(item.details).map(([key, value]) => `
                <div class="detail-row">
                  <div class="detail-label">${key}</div>
                  <div class="detail-value">${formatCurrency(value)}</div>
                </div>
              `).join('')}
            </div>
          </div>
        ` : ''}
      `;
      
      return div;
    }
    
    function toggleAccordion(header) {
      const content = header.nextElementSibling;
      const isActive = header.classList.contains('active');
      
      // 다른 아코디언 닫기
      document.querySelectorAll('.accordion-header.active').forEach(h => {
        h.classList.remove('active');
        h.nextElementSibling.classList.remove('active');
      });
      
      // 현재 아코디언 토글
      if (!isActive) {
        header.classList.add('active');
        content.classList.add('active');
      }
    }
    
    function renderRatios(data) {
      const container = document.getElementById('ratioGrid');
      container.innerHTML = '';
      
      const ratios = [
        { label: '원가율', value: data.ratios.cogsRatio, color: 'var(--accent-red)' },
        { label: '인건비율', value: data.ratios.laborRatio, color: 'var(--accent-yellow)' },
        { label: '고정비율', value: data.ratios.fixedRatio, color: 'var(--text-secondary)' },
        { label: '변동비율', value: data.ratios.variableRatio, color: 'var(--text-secondary)' },
        { label: '순이익률', value: data.ratios.netProfitRatio, color: 'var(--accent-green)' }
      ];
      
      ratios.forEach(ratio => {
        const card = document.createElement('div');
        card.className = 'ratio-card';
        card.innerHTML = `
          <div class="ratio-label">${ratio.label}</div>
          <div class="ratio-value">${ratio.value.toFixed(1)}%</div>
          <div class="ratio-bar">
            <div class="ratio-fill" style="width: ${Math.min(ratio.value, 100)}%; background: ${ratio.color};"></div>
          </div>
        `;
        container.appendChild(card);
      });
    }
    
    function renderGoals(data) {
      // 매출 목표
      const revenuePercent = Math.min((data.revenue.total / APP_STATE.goals.revenue) * 100, 100);
      document.getElementById('revenueProgress').style.width = revenuePercent + '%';
      document.getElementById('revenueProgressText').textContent = revenuePercent.toFixed(1) + '%';
      document.getElementById('currentRevenue').textContent = formatCurrency(data.revenue.total);
      document.getElementById('goalRevenue').textContent = formatCurrency(APP_STATE.goals.revenue);
      
      // 순이익 목표
      const profitPercent = Math.min((data.netProfit / APP_STATE.goals.profit) * 100, 100);
      document.getElementById('profitProgress').style.width = profitPercent + '%';
      document.getElementById('profitProgressText').textContent = profitPercent.toFixed(1) + '%';
      document.getElementById('currentProfit').textContent = formatCurrency(data.netProfit);
      document.getElementById('goalProfit').textContent = formatCurrency(APP_STATE.goals.profit);
    }
    
    async function loadDailyRevenue() {
      // 일별 매출 데이터 로드 및 렌더링
      const container = document.getElementById('dailyGrid');
      container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-secondary);">일별 매출 데이터를 불러오는 중...</div>';
      
      // TODO: API 호출하여 일별 데이터 가져오기
      setTimeout(() => {
        container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-secondary);">일별 매출 기능은 곧 제공됩니다</div>';
      }, 500);
    }
    
    function renderCharts() {
      // TODO: 실제 데이터로 차트 렌더링
      console.log('Charts rendering...');
    }
    
    function editGoal(type) {
      const current = APP_STATE.goals[type];
      const label = type === 'revenue' ? '매출' : '순이익';
      const newValue = prompt(`월 ${label} 목표를 입력하세요 (원):`, current);
      
      if (newValue && !isNaN(newValue)) {
        APP_STATE.goals[type] = parseInt(newValue);
        localStorage.setItem(`goal${type.charAt(0).toUpperCase() + type.slice(1)}`, newValue);
        renderGoals(APP_STATE.data);
      }
    }
    
    function formatCurrency(num) {
      if (num === null || num === undefined) return '-';
      return num.toLocaleString('ko-KR') + '원';
    }
    
    function getSampleData() {
      return {
        revenue: { total: 33967020, cash: 1310265, card: 32656755 },
        cogs: { total: 2300608, items: { '미락': 500000, '마트': 350000, '고기값': 1000000, '특양': 250000, '콩나물': 200000 } },
        grossProfit: 31666412,
        laborCost: { total: 2648000, items: { '사장님': 3400000, '황미랑': 3400000, '최진영': 2900000, '고윤성': 882000, '조유하': 819000 } },
        fixedCost: { total: 196800, items: { '임대료': 100000, '관리비': 19900, '세무사비용': 77000 } },
        variableCost: { total: 312720, items: { '기본+수수료': 292320, '가스사용료': 152480, '매장관리비': 449730 } },
        operatingProfit: 20400,
        tax: 148,
        netProfit: 1141815,
        lastUpdatedDay: 17,
        ratios: { cogsRatio: 6.8, laborRatio: 7.8, fixedRatio: 0.6, variableRatio: 0.9, netProfitRatio: 3.4 }
      };
    }
  </script>
